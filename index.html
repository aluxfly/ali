<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目雷达 - 国家电网招标公告</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .project-card { transition: all 0.2s ease; }
    .project-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .detail-row { display: grid; grid-template-columns: 120px 1fr; gap: 8px; padding: 6px 0; }
    .detail-label { font-weight: 600; color: #6b7280; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="container mx-auto px-4 py-6 max-w-6xl">
    <!-- Header -->
    <header class="mb-6">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">📡 项目雷达</h1>
      <p class="text-gray-600">国家电网招标公告聚合平台</p>
      <div class="mt-4 flex items-center gap-4 text-sm text-gray-500">
        <span id="stats-total">共 0 个项目</span>
        <span id="stats-date">数据更新于：--</span>
      </div>
    </header>

    <!-- Filters -->
    <div class="bg-white rounded-lg shadow p-4 mb-6">
      <div class="flex flex-wrap gap-4">
        <div class="flex-1 min-w-[200px]">
          <label class="block text-sm font-medium text-gray-700 mb-1">地区筛选</label>
          <select id="filter-region" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            <option value="">全部地区</option>
          </select>
        </div>
        <div class="flex-1 min-w-[200px]">
          <label class="block text-sm font-medium text-gray-700 mb-1">类型筛选</label>
          <select id="filter-type" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            <option value="">全部类型</option>
            <option value="招标">招标</option>
            <option value="采购">采购</option>
            <option value="谈判">谈判</option>
            <option value="变更">变更</option>
          </select>
        </div>
        <div class="flex-1 min-w-[200px]">
          <label class="block text-sm font-medium text-gray-700 mb-1">搜索</label>
          <input type="text" id="search-input" placeholder="关键词搜索..." class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
      </div>
    </div>

    <!-- Project List -->
    <div id="project-list" class="space-y-4">
      <!-- Projects will be rendered here -->
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-12">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
      <p class="mt-4 text-gray-600">加载中...</p>
    </div>

    <!-- Error -->
    <div id="error" class="hidden bg-red-50 border border-red-200 rounded-lg p-4 text-red-700">
      <p class="font-medium">加载失败</p>
      <p id="error-message" class="text-sm mt-1"></p>
    </div>
  </div>

  <script>
    let allProjects = [];
    let regions = new Set();

    // Render a single project card
    function renderProject(project, index) {
      const isExpanded = project._expanded ? 'block' : 'hidden';
      const regionBadge = project.region ? 
        `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">${project.region}</span>` : '';
      
      const typeTags = (project.description || '').split(',').map(t => t.trim()).filter(t => t).map(t => 
        `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800">${t}</span>`
      ).join(' ');

      return `
        <div class="project-card bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
          <div class="p-4 cursor-pointer" onclick="toggleProject(${index})">
            <div class="flex items-start justify-between gap-4">
              <div class="flex-1">
                <h3 class="text-lg font-semibold text-gray-800 mb-2">${project.title}</h3>
                <div class="flex flex-wrap gap-2 mb-2">
                  ${regionBadge}
                  ${typeTags}
                </div>
                <div class="text-sm text-gray-500">
                  <span>📅 ${project.publish_date || '未知日期'}</span>
                </div>
              </div>
              <div class="flex-shrink-0">
                <svg class="w-6 h-6 text-gray-400 transform transition-transform ${project._expanded ? 'rotate-180' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
              </div>
            </div>
          </div>
          
          <div id="detail-${index}" class="${isExpanded} border-t border-gray-200 bg-gray-50 px-4 py-3">
            <div class="detail-row">
              <span class="detail-label">发布日期:</span>
              <span>${project.publish_date || '未知'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">地区:</span>
              <span>${project.region || '未知'}</span>
            </div>
            ${project.amount ? `
            <div class="detail-row">
              <span class="detail-label">金额:</span>
              <span>${project.amount}</span>
            </div>` : ''}
            ${project.deadline ? `
            <div class="detail-row">
              <span class="detail-label">截止日期:</span>
              <span>${project.deadline}</span>
            </div>` : ''}
            ${project.contact ? `
            <div class="detail-row">
              <span class="detail-label">联系方式:</span>
              <span>${project.contact}</span>
            </div>` : ''}
            ${project.link ? `
            <div class="mt-3 pt-3 border-t border-gray-200">
              <a href="${project.link}" target="_blank" class="inline-flex items-center text-blue-600 hover:text-blue-800 font-medium">
                查看原文 <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
              </a>
            </div>` : ''}
          </div>
        </div>
      `;
    }

    // Toggle project detail expansion
    function toggleProject(index) {
      const project = allProjects[index];
      project._expanded = !project._expanded;
      renderProjects();
    }

    // Filter and render projects
    function renderProjects() {
      const regionFilter = document.getElementById('filter-region').value;
      const typeFilter = document.getElementById('filter-type').value;
      const searchQuery = document.getElementById('search-input').value.toLowerCase();

      const filtered = allProjects.filter(p => {
        const matchRegion = !regionFilter || p.region === regionFilter;
        const matchType = !typeFilter || (p.description && p.description.includes(typeFilter));
        const matchSearch = !searchQuery || p.title.toLowerCase().includes(searchQuery);
        return matchRegion && matchType && matchSearch;
      });

      const listEl = document.getElementById('project-list');
      listEl.innerHTML = filtered.map((p, i) => {
        const originalIndex = allProjects.indexOf(p);
        return renderProject(p, originalIndex);
      }).join('');

      document.getElementById('stats-total').textContent = `显示 ${filtered.length} / ${allProjects.length} 个项目`;
    }

    // Populate region dropdown
    function populateRegions() {
      const select = document.getElementById('filter-region');
      const sortedRegions = Array.from(regions).sort();
      sortedRegions.forEach(r => {
        const option = document.createElement('option');
        option.value = r;
        option.textContent = r;
        select.appendChild(option);
      });
    }

    // Load data
    async function loadData() {
      try {
        const response = await fetch('data/projects.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        
        allProjects = data.projects || [];
        document.getElementById('stats-date').textContent = `数据更新于：${data.crawl_date || '未知'}`;
        
        // Collect regions
        allProjects.forEach(p => {
          if (p.region) regions.add(p.region);
        });
        
        populateRegions();
        renderProjects();
        
        document.getElementById('loading').classList.add('hidden');
      } catch (err) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('error-message').textContent = err.message;
      }
    }

    // Event listeners
    document.getElementById('filter-region').addEventListener('change', renderProjects);
    document.getElementById('filter-type').addEventListener('change', renderProjects);
    document.getElementById('search-input').addEventListener('input', renderProjects);

    // Initialize
    loadData();
  </script>
</body>
</html>
