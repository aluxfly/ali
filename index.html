<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目雷达 - 国家电网招标公告</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .project-card { transition: all 0.2s ease; }
    .project-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .detail-row { display: grid; grid-template-columns: 120px 1fr; gap: 8px; padding: 6px 0; }
    .detail-label { font-weight: 600; color: #6b7280; }
    .pagination-btn { padding: 6px 12px; border: 1px solid #d1d5db; background: white; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
    .pagination-btn:hover { background: #f3f4f6; }
    .pagination-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }
    .pagination-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Navigation buttons */
    .nav-btn { padding: 8px 16px; border-radius: 8px; font-weight: 500; font-size: 14px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; }
    .nav-btn-primary { background: #5465ff; color: white; }
    .nav-btn-primary:hover { background: #4354e6; }
    .nav-btn-secondary { color: #6b7280; background: transparent; }
    .nav-btn-secondary:hover { background: #f3f4f6; color: #374151; }
    @media (max-width: 640px) {
      .nav-buttons { flex-direction: column; gap: 8px !important; align-items: flex-start !important; }
      .nav-btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="container mx-auto px-4 py-6 max-w-6xl">
    <!-- Header -->
    <header class="mb-6">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
          <h1 class="text-3xl font-bold text-gray-800 mb-2">📡 项目雷达</h1>
          <p class="text-gray-600">国家电网招标公告聚合平台</p>
          <div class="mt-2 flex items-center gap-4 text-sm text-gray-500">
            <span id="stats-total">共 0 个项目</span>
            <span id="stats-date">数据更新于：--</span>
          </div>
        </div>
        <!-- Navigation Buttons -->
        <div class="nav-buttons flex items-center gap-3">
          <a href="bid_factory/index.html" class="nav-btn nav-btn-secondary">标书工厂</a>
          <a href="win_prediction.html" class="nav-btn nav-btn-secondary">中标预测</a>
          <a href="#" class="nav-btn nav-btn-primary">项目搜索</a>
        </div>
      </div>
    </header>

    <!-- Filters -->
    <div class="bg-white rounded-lg shadow p-4 mb-6">
      <div class="flex flex-wrap gap-4">
        <div class="flex-1 min-w-[180px]">
          <label class="block text-sm font-medium text-gray-700 mb-1">地区筛选</label>
          <select id="filter-region" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            <option value="">全部地区</option>
          </select>
        </div>
        <div class="flex-1 min-w-[180px]">
          <label class="block text-sm font-medium text-gray-700 mb-1">类型筛选</label>
          <select id="filter-type" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            <option value="">全部类型</option>
            <option value="招标">招标</option>
            <option value="采购">采购</option>
            <option value="谈判">谈判</option>
            <option value="变更">变更</option>
          </select>
        </div>
        <div class="flex-1 min-w-[180px]">
          <label class="block text-sm font-medium text-gray-700 mb-1">发布日期</label>
          <input type="date" id="filter-date" class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
        <div class="flex-1 min-w-[200px]">
          <label class="block text-sm font-medium text-gray-700 mb-1">搜索</label>
          <input type="text" id="search-input" placeholder="关键词搜索..." class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>
      </div>
      <div class="mt-3 flex items-center gap-2">
        <button onclick="clearFilters()" class="text-sm text-blue-600 hover:text-blue-800 font-medium">清除所有筛选</button>
      </div>
    </div>

    <!-- Project List -->
    <div id="project-list" class="space-y-4">
      <!-- Projects will be rendered here -->
    </div>

    <!-- Pagination -->
    <div id="pagination" class="mt-6 flex items-center justify-between bg-white rounded-lg shadow p-4">
      <div class="text-sm text-gray-600" id="pagination-info">
        共 0 条 | 第 1/1 页
      </div>
      <div class="flex items-center gap-2" id="pagination-controls">
        <!-- Pagination buttons will be rendered here -->
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-12">
      <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
      <p class="mt-4 text-gray-600">加载中...</p>
    </div>

    <!-- Error -->
    <div id="error" class="hidden bg-red-50 border border-red-200 rounded-lg p-4 text-red-700">
      <p class="font-medium">加载失败</p>
      <p id="error-message" class="text-sm mt-1"></p>
    </div>
  </div>

  <script>
    let allProjects = [];
    let filteredProjects = [];
    let regions = new Set();
    
    // Pagination settings
    const ITEMS_PER_PAGE = 20;
    let currentPage = 1;
    let totalPages = 1;

    // Render a single project card
    function renderProject(project, index) {
      const isExpanded = project._expanded ? 'block' : 'hidden';
      const regionBadge = project.region ? 
        `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">${project.region}</span>` : '';
      
      const typeTags = (project.description || '').split(',').map(t => t.trim()).filter(t => t).map(t => 
        `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800">${t}</span>`
      ).join(' ');

      return `
        <div class="project-card bg-white rounded-lg shadow border border-gray-200 overflow-hidden">
          <div class="p-4 cursor-pointer" onclick="toggleProject(${index})">
            <div class="flex items-start justify-between gap-4">
              <div class="flex-1">
                <h3 class="text-lg font-semibold text-gray-800 mb-2">${project.title}</h3>
                <div class="flex flex-wrap gap-2 mb-2">
                  ${regionBadge}
                  ${typeTags}
                </div>
                <div class="text-sm text-gray-500">
                  <span>📅 ${project.publish_date || '未知日期'}</span>
                </div>
              </div>
              <div class="flex-shrink-0">
                <svg class="w-6 h-6 text-gray-400 transform transition-transform ${project._expanded ? 'rotate-180' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
              </div>
            </div>
          </div>
          
          <div id="detail-${index}" class="${isExpanded} border-t border-gray-200 bg-gray-50 px-4 py-3">
            <div class="detail-row">
              <span class="detail-label">发布日期:</span>
              <span>${project.publish_date || '未知'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">地区:</span>
              <span>${project.region || '未知'}</span>
            </div>
            ${project.amount ? `
            <div class="detail-row">
              <span class="detail-label">金额:</span>
              <span>${project.amount}</span>
            </div>` : ''}
            ${project.deadline ? `
            <div class="detail-row">
              <span class="detail-label">截止日期:</span>
              <span>${project.deadline}</span>
            </div>` : ''}
            ${project.contact ? `
            <div class="detail-row">
              <span class="detail-label">联系方式:</span>
              <span>${project.contact}</span>
            </div>` : ''}
            ${project.link ? `
            <div class="mt-3 pt-3 border-t border-gray-200">
              <a href="${project.link}" target="_blank" class="inline-flex items-center text-blue-600 hover:text-blue-800 font-medium">
                查看原文 <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
              </a>
            </div>` : ''}
          </div>
        </div>
      `;
    }

    // Toggle project detail expansion
    function toggleProject(index) {
      const project = allProjects.find(p => p.title === filteredProjects[index].title && p.publish_date === filteredProjects[index].publish_date);
      if (project) {
        project._expanded = !project._expanded;
        renderPage(currentPage);
      }
    }

    // Filter projects
    function filterProjects() {
      const regionFilter = document.getElementById('filter-region').value;
      const typeFilter = document.getElementById('filter-type').value;
      const dateFilter = document.getElementById('filter-date').value;
      const searchQuery = document.getElementById('search-input').value.toLowerCase();

      filteredProjects = allProjects.filter(p => {
        const matchRegion = !regionFilter || p.region === regionFilter;
        const matchType = !typeFilter || (p.description && p.description.includes(typeFilter));
        const matchDate = !dateFilter || (p.publish_date && p.publish_date.startsWith(dateFilter));
        const matchSearch = !searchQuery || p.title.toLowerCase().includes(searchQuery);
        return matchRegion && matchType && matchDate && matchSearch;
      });

      // Update pagination
      totalPages = Math.max(1, Math.ceil(filteredProjects.length / ITEMS_PER_PAGE));
      currentPage = Math.min(currentPage, totalPages);
      
      renderPage(currentPage);
    }

    // Render pagination controls
    function renderPagination(page, total) {
      const controlsEl = document.getElementById('pagination-controls');
      const infoEl = document.getElementById('pagination-info');
      
      infoEl.textContent = `共 ${filteredProjects.length} 条 | 第 ${page}/${total} 页`;
      
      let html = '';
      
      // Previous button
      html += `<button class="pagination-btn" ${page <= 1 ? 'disabled' : ''} onclick="goToPage(${page - 1})">← 上一页</button>`;
      
      // Page numbers
      const maxVisible = 5;
      let startPage = Math.max(1, page - Math.floor(maxVisible / 2));
      let endPage = Math.min(total, startPage + maxVisible - 1);
      
      if (endPage - startPage < maxVisible - 1) {
        startPage = Math.max(1, endPage - maxVisible + 1);
      }
      
      if (startPage > 1) {
        html += `<button class="pagination-btn" onclick="goToPage(1)">1</button>`;
        if (startPage > 2) {
          html += `<span class="px-2 text-gray-400">...</span>`;
        }
      }
      
      for (let i = startPage; i <= endPage; i++) {
        html += `<button class="pagination-btn ${i === page ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      
      if (endPage < total) {
        if (endPage < total - 1) {
          html += `<span class="px-2 text-gray-400">...</span>`;
        }
        html += `<button class="pagination-btn" onclick="goToPage(${total})">${total}</button>`;
      }
      
      // Next button
      html += `<button class="pagination-btn" ${page >= total ? 'disabled' : ''} onclick="goToPage(${page + 1})">下一页 →</button>`;
      
      controlsEl.innerHTML = html;
    }

    // Render current page
    function renderPage(page) {
      const start = (page - 1) * ITEMS_PER_PAGE;
      const end = Math.min(start + ITEMS_PER_PAGE, filteredProjects.length);
      const pageProjects = filteredProjects.slice(start, end);

      const listEl = document.getElementById('project-list');
      listEl.innerHTML = pageProjects.map((p, i) => {
        const originalIndex = filteredProjects.indexOf(p);
        return renderProject(p, start + i);
      }).join('');

      renderPagination(page, totalPages);
      document.getElementById('stats-total').textContent = `显示 ${filteredProjects.length} / ${allProjects.length} 个项目`;
    }

    // Go to specific page
    function goToPage(page) {
      if (page < 1 || page > totalPages) return;
      currentPage = page;
      renderPage(page);
      // Scroll to top of project list
      document.getElementById('project-list').scrollIntoView({ behavior: 'smooth' });
    }

    // Clear all filters
    function clearFilters() {
      document.getElementById('filter-region').value = '';
      document.getElementById('filter-type').value = '';
      document.getElementById('filter-date').value = '';
      document.getElementById('search-input').value = '';
      currentPage = 1;
      filterProjects();
    }

    // Populate region dropdown
    function populateRegions() {
      const select = document.getElementById('filter-region');
      const sortedRegions = Array.from(regions).sort();
      sortedRegions.forEach(r => {
        const option = document.createElement('option');
        option.value = r;
        option.textContent = r;
        select.appendChild(option);
      });
    }

    // Load data
    async function loadData() {
      try {
        const response = await fetch('data/projects.json');
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const data = await response.json();
        
        allProjects = data.projects || [];
        document.getElementById('stats-date').textContent = `数据更新于：${data.crawl_date || '未知'}`;
        
        // Collect regions
        allProjects.forEach(p => {
          if (p.region) regions.add(p.region);
        });
        
        populateRegions();
        filteredProjects = [...allProjects];
        totalPages = Math.ceil(filteredProjects.length / ITEMS_PER_PAGE);
        renderPage(1);
        
        document.getElementById('loading').classList.add('hidden');
      } catch (err) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error').classList.remove('hidden');
        document.getElementById('error-message').textContent = err.message;
      }
    }

    // Event listeners
    document.getElementById('filter-region').addEventListener('change', () => { currentPage = 1; filterProjects(); });
    document.getElementById('filter-type').addEventListener('change', () => { currentPage = 1; filterProjects(); });
    document.getElementById('filter-date').addEventListener('change', () => { currentPage = 1; filterProjects(); });
    document.getElementById('search-input').addEventListener('input', () => { currentPage = 1; filterProjects(); });

    // Initialize
    loadData();
  </script>
</body>
</html>
