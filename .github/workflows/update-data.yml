name: 🔄 自动更新项目数据

on:
  # 手动触发（通过 GitHub UI 或 API）
  workflow_dispatch:
    inputs:
      trigger_source:
        description: '触发来源'
        required: false
        default: 'manual'
        type: string
  
  # 定时触发（每天 8:00 UTC，即北京时间 16:00）
  schedule:
    - cron: '0 0 * * *'

  # 允许从其他仓库触发（可选）
  repository_dispatch:
    types: [update-data]

# 设置权限
permissions:
  contents: write
  pages: write
  id-token: write

# 取消正在运行的重复工作流
concurrency:
  group: update-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium
          pip install -r requirements.txt 2>/dev/null || true

      - name: 🕷️ 执行爬虫脚本
        run: |
          echo "开始执行爬虫脚本..."
          python3.11 crawl_sgcc.py
          echo "爬虫执行完成"
        env:
          PLAYWRIGHT_BROWSERS_PATH: /home/runner/.cache/ms-playwright

      - name: 📊 验证数据文件
        run: |
          if [ -f "data/projects.json" ]; then
            echo "✅ 数据文件存在"
            echo "文件大小：$(wc -c < data/projects.json) bytes"
            echo "项目数量：$(python3.11 -c "import json; print(len(json.load(open('data/projects.json'))['projects']))")"
          else
            echo "❌ 数据文件不存在"
            exit 1
          fi

      - name: 📅 更新元数据
        run: |
          python3.11 << 'EOF'
          import json
          from datetime import datetime, timezone

          # 读取现有数据
          with open('data/projects.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          # 更新元数据
          data['crawl_date'] = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M:%S UTC')
          data['last_updated'] = datetime.now(timezone.utc).isoformat()
          data['update_source'] = 'github-actions'

          # 写回文件
          with open('data/projects.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print(f"✅ 元数据已更新：{data['crawl_date']}")
          EOF

      - name: 🚀 提交并推送更新
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查是否有变更
          if [ -n "$(git status --porcelain data/projects.json)" ]; then
            git add data/projects.json
            git commit -m "🤖 自动更新项目数据 [skip ci]

          更新时间：$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          触发来源：${{ github.event.inputs.trigger_source || 'scheduled' }}
          工作流运行：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          "
            git push origin main
            echo "✅ 数据已提交并推送"
          else
            echo "ℹ️ 数据无变更，跳过提交"
          fi

      - name: 📄 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: false
          full_commit_message: |
            🤖 部署更新 [skip ci]

            自动部署由 GitHub Actions 触发
            运行 ID: ${{ github.run_id }}

      - name: ✅ 完成通知
        run: |
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║           ✅ 数据更新完成                                ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  更新时间：$(date -u '+%Y-%m-%d %H:%M:%S UTC')           ║"
          echo "║  触发来源：${{ github.event.inputs.trigger_source || 'scheduled' }}"
          echo "║  运行 ID:   ${{ github.run_id }}"
          echo "║  仓库：     ${{ github.repository }}"
          echo "╚══════════════════════════════════════════════════════════╝"
