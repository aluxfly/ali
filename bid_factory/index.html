<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>标书工厂 - 智能标书生成器</title>
    <link rel="stylesheet" href="../css/design-system.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="body-bg"></div>
    
    <div class="container container-narrow">
        <!-- 统一导航栏 -->
        <nav class="navbar">
            <div class="navbar-content">
                <div class="navbar-brand">
                    <div class="navbar-logo" style="background: var(--bid-gradient);">📄</div>
                    <div class="navbar-title">
                        <h1>标书工厂</h1>
                        <p>智能标书生成器 - 上传招标公告，一键生成完整标书</p>
                    </div>
                </div>
                <!-- 导航按钮 -->
                <div class="navbar-nav">
                    <a href="../index.html" class="nav-btn nav-btn-secondary nav-btn-radar">
                        <span class="module-icon">📡</span>项目搜索
                    </a>
                    <a href="../win_prediction.html" class="nav-btn nav-btn-secondary nav-btn-prediction">
                        <span class="module-icon">🎯</span>中标预测
                    </a>
                    <a href="./index.html" class="nav-btn nav-btn-active nav-btn-bid">
                        <span class="module-icon">📄</span>标书工厂
                    </a>
                </div>
            </div>
        </nav>

        <main class="card">
            <div class="card-body">
                <!-- 步骤指示器 -->
                <div class="step-indicator">
                    <div class="step-dot active" id="dot-1"></div>
                    <div class="step-dot" id="dot-2"></div>
                    <div class="step-dot" id="dot-3"></div>
                    <div class="step-dot" id="dot-4"></div>
                </div>
                
                <!-- 步骤 1: 上传招标公告 -->
                <section class="step" id="step1">
                    <div class="step-header">
                        <span class="step-number">1</span>
                        <h2>上传招标公告</h2>
                    </div>
                    <div class="step-content">
                        <div style="margin-bottom: var(--space-4);">
                            <p style="color: var(--slate-600); font-size: var(--text-sm); line-height: 1.7;">
                                请将招标公告内容粘贴到下方文本框中，系统将自动解析关键信息。
                                支持国家电网、南方电网等主流招标公告格式。
                            </p>
                        </div>
                        <textarea 
                            id="announcementInput" 
                            placeholder="请粘贴招标公告内容...

示例格式：
项目名称：某某采购项目
项目编号：XXX-2024-001
招标人：某某单位
预算金额：XXX 万元
投标截止时间：2024 年 X 月 X 日
项目地点：某某市
技术要求：...
资质要求：..."
                            rows="14"
                            class="form-textarea"></textarea>
                        <div class="btn-group mt-4">
                            <button class="btn btn-primary" onclick="parseAnnouncement()" style="flex: 2;">
                                🔍 解析公告信息
                            </button>
                            <button class="btn btn-secondary" onclick="loadSample()" style="flex: 1;">
                                📋 加载示例
                            </button>
                        </div>
                    </div>
                </section>

                <!-- 步骤 2: 确认信息 -->
                <section class="step" id="step2" style="display: none;">
                    <div class="step-header">
                        <span class="step-number">2</span>
                        <h2>确认项目信息</h2>
                    </div>
                    <div class="step-content">
                        <div style="margin-bottom: var(--space-4);">
                            <p style="color: var(--slate-600); font-size: var(--text-sm);">
                                请核对以下信息，点击字段可直接编辑修改
                            </p>
                        </div>
                        <div class="info-grid" id="parsedInfo">
                            <!-- 动态填充 -->
                        </div>
                        <div class="btn-group mt-4">
                            <button class="btn btn-secondary" onclick="backToStep1()">
                                ← 返回修改
                            </button>
                            <button class="btn btn-primary" onclick="generateBid()">
                                ✨ 生成标书
                            </button>
                        </div>
                    </div>
                </section>

                <!-- 步骤 3: 生成进度 -->
                <section class="step" id="step3" style="display: none;">
                    <div class="step-header">
                        <span class="step-number">3</span>
                        <h2>生成标书</h2>
                    </div>
                    <div class="step-content">
                        <div class="progress-container">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                        <p class="progress-text" id="progressText">正在生成...</p>
                        <div class="loading-spinner" id="loadingSpinner">
                            <div class="spinner"></div>
                        </div>
                    </div>
                </section>

                <!-- 步骤 4: 下载结果 -->
                <section class="step" id="step4" style="display: none;">
                    <div class="step-header">
                        <span class="step-number" style="background: var(--emerald-500); box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);">✓</span>
                        <h2>下载标书</h2>
                    </div>
                    <div class="step-content">
                        <div class="success-message">
                            <div class="success-icon">✅</div>
                            <h3>标书生成完成！</h3>
                            <p>请选择要下载的文档，或一键下载全部文件</p>
                        </div>
                        <div class="download-grid" id="downloadOptions">
                            <!-- 动态填充 -->
                        </div>
                        <div class="btn-group mt-4">
                            <button class="btn btn-primary" onclick="downloadAll()" style="flex: 2;">
                                📦 下载全部
                            </button>
                            <button class="btn btn-secondary" onclick="startOver()" style="flex: 1;">
                                🔄 重新生成
                            </button>
                        </div>
                        <div class="btn-group mt-4">
                            <button class="btn btn-success" onclick="checkBid()">
                                📋 标书检查
                            </button>
                        </div>
                        <!-- 标书检查结果区域 -->
                        <div id="checkResult" style="display: none; margin-top: var(--space-8);">
                            <div class="step-header">
                                <span class="step-number" style="background: var(--emerald-500); box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);">✓</span>
                                <h2>标书完整度检查</h2>
                            </div>
                            <div class="step-content">
                                <!-- 总体评分 -->
                                <div id="overallScore" style="text-align: center; padding: var(--space-8); margin-bottom: var(--space-6);">
                                    <div id="scoreValue">--</div>
                                    <div style="color: var(--slate-500); font-weight: var(--font-medium); margin-top: var(--space-2);">完整度评分</div>
                                </div>
                                <!-- 技术标检查 -->
                                <div id="techCheck" style="margin-bottom: var(--space-6);"></div>
                                <!-- 商务标检查 -->
                                <div id="businessCheck" style="margin-bottom: var(--space-6);"></div>
                                <!-- 风险提示 -->
                                <div id="riskWarning" style="padding: var(--space-4); background: linear-gradient(135deg, #fef3c7, #fffbeb); border-left: 6px solid var(--amber-500); border-radius: var(--radius-xl); display: none;">
                                    <strong style="color: var(--amber-800); font-size: var(--text-base);">⚠️ 风险提示</strong>
                                    <ul id="riskList" style="margin: var(--space-2) 0 0 var(--space-6); color: var(--amber-700); line-height: 1.8;"></ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <footer>
            <p>标书工厂 v1.0 | 基于浏览器端智能生成 | 无需上传服务器</p>
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
        // 步骤指示器更新函数
        function updateStepIndicator(step) {
            for (let i = 1; i <= 4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                dot.classList.remove('active', 'completed');
                if (i < step) {
                    dot.classList.add('completed');
                } else if (i === step) {
                    dot.classList.add('active');
                }
            }
        }

        // 重写 showStep 函数以包含指示器更新
        const originalShowStep = window.showStep;
        window.showStep = function(step) {
            if (originalShowStep) originalShowStep(step);
            updateStepIndicator(step);
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateStepIndicator(1);
        });
    </script>
</body>
</html>
