<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中标预测 - 项目雷达</title>
  <link rel="stylesheet" href="css/design-system.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* 页面特定样式 */
    .prediction-card {
      transition: all var(--transition-slow);
    }
    
    .prediction-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
    }
    
    .probability-high {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      box-shadow: 0 8px 30px rgba(16, 185, 129, 0.4);
    }
    
    .probability-medium {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      box-shadow: 0 8px 30px rgba(245, 158, 11, 0.4);
    }
    
    .probability-low {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      box-shadow: 0 8px 30px rgba(239, 68, 68, 0.4);
    }
    
    .module-icon {
      font-size: 18px;
    }
    
    /* 概率仪表盘 */
    .probability-gauge {
      position: relative;
      width: 200px;
      height: 200px;
    }
    
    /* 策略卡片 */
    .strategy-item {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      padding: var(--space-4);
      background: linear-gradient(135deg, var(--cosmic-50), white);
      border: 1px solid var(--cosmic-100);
      border-radius: var(--radius-lg);
      transition: all var(--transition-base);
    }
    
    .strategy-item:hover {
      transform: translateX(4px);
      border-color: var(--cosmic-300);
      box-shadow: var(--shadow-md);
    }
    
    /* 竞争对手卡片 */
    .competitor-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      background: var(--slate-50);
      border-radius: var(--radius-lg);
      border: 1px solid var(--slate-200);
      transition: all var(--transition-base);
    }
    
    .competitor-item:hover {
      background: white;
      border-color: var(--cosmic-300);
      box-shadow: var(--shadow-sm);
    }
    
    /* 因素卡片 */
    .factor-card {
      padding: var(--space-4);
      border-radius: var(--radius-xl);
      text-align: center;
      transition: all var(--transition-base);
      border: 2px solid transparent;
    }
    
    .factor-card:hover {
      transform: scale(1.05);
    }
    
    .factor-positive {
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      border-color: var(--emerald-200);
    }
    
    .factor-negative {
      background: linear-gradient(135deg, #fef2f2, #fee2e2);
      border-color: var(--coral-200);
    }
    
    .factor-neutral {
      background: linear-gradient(135deg, var(--slate-50), var(--slate-100));
      border-color: var(--slate-200);
    }
    
    /* 输入表单增强 */
    .input-card {
      background: linear-gradient(180deg, var(--slate-50) 0%, white 100%);
      border: 1px solid var(--slate-200);
    }
    
    /* 空状态 */
    .empty-prediction {
      text-align: center;
      padding: var(--space-16);
    }
    
    .empty-prediction-icon {
      font-size: 80px;
      margin-bottom: var(--space-4);
      animation: pulse 3s ease-in-out infinite;
    }
    
    /* 结果区域动画 */
    .result-section {
      animation: fadeIn 0.6s ease-out;
    }
    
    /* Chart 容器 */
    .chart-container {
      position: relative;
      height: 250px;
    }
  </style>
</head>
<body>
  <!-- 背景装饰 -->
  <div class="body-bg"></div>
  
  <div class="container mx-auto px-4 py-8 max-w-6xl">
    <!-- 统一导航栏 -->
    <nav class="navbar">
      <div class="navbar-content">
        <div class="navbar-brand">
          <div class="navbar-logo" style="background: var(--prediction-gradient);">🎯</div>
          <div class="navbar-title">
            <h1>中标预测</h1>
            <p>基于历史数据的智能中标概率分析</p>
          </div>
        </div>
        <!-- 导航按钮 -->
        <div class="navbar-nav">
          <a href="index.html" class="nav-btn nav-btn-secondary nav-btn-radar">
            <span class="module-icon">📡</span>项目搜索
          </a>
          <a href="#" class="nav-btn nav-btn-active nav-btn-prediction">
            <span class="module-icon">🎯</span>中标预测
          </a>
          <a href="bid_factory/index.html" class="nav-btn nav-btn-secondary nav-btn-bid">
            <span class="module-icon">📄</span>标书工厂
          </a>
        </div>
      </div>
    </nav>

    <!-- 输入表单 -->
    <div class="card input-card mb-8">
      <div class="card-header">
        <div class="flex items-center gap-3">
          <span style="font-size: 24px;">📋</span>
          <h2 class="text-xl font-semibold" style="color: var(--slate-800); font-weight: var(--font-bold);">项目信息输入</h2>
        </div>
      </div>
      <div class="card-body">
        <div class="grid md:grid-cols-3 gap-4">
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">📝 项目名称</label>
            <input type="text" id="project-name" placeholder="请输入项目名称" class="form-input">
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">💰 预算金额（万元）</label>
            <input type="number" id="budget-amount" placeholder="例如：500" class="form-input">
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">🏢 招标单位</label>
            <input type="text" id="tender-unit" placeholder="请输入招标单位" class="form-input">
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">📑 项目类型</label>
            <select id="project-type" class="form-select">
              <option value="">请选择类型</option>
              <option value="construction">工程施工</option>
              <option value="equipment">设备采购</option>
              <option value="service">服务类</option>
              <option value="design">设计咨询</option>
              <option value="material">材料采购</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">📍 所在地区</label>
            <select id="project-region" class="form-select">
              <option value="">请选择地区</option>
              <option value="华北">华北</option>
              <option value="华东">华东</option>
              <option value="华南">华南</option>
              <option value="华中">华中</option>
              <option value="西南">西南</option>
              <option value="西北">西北</option>
              <option value="东北">东北</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label">🏆 企业资质等级</label>
            <select id="qualification" class="form-select">
              <option value="">请选择资质</option>
              <option value="A">甲级/一级</option>
              <option value="B">乙级/二级</option>
              <option value="C">丙级/三级</option>
            </select>
          </div>
        </div>
        <div class="mt-6 btn-group">
          <button onclick="predictWin()" class="btn btn-primary btn-lg" style="padding: var(--space-3) var(--space-8); font-size: var(--text-base);">
            🔮 开始预测
          </button>
          <button onclick="clearForm()" class="btn btn-secondary btn-lg" style="padding: var(--space-3) var(--space-8); font-size: var(--text-base);">
            🧹 清空表单
          </button>
        </div>
      </div>
    </div>

    <!-- 预测结果 -->
    <div id="prediction-result" class="hidden result-section">
      <!-- 概率卡片 -->
      <div class="card mb-8">
        <div class="card-header">
          <div class="flex items-center gap-3">
            <span style="font-size: 24px;">📊</span>
            <h2 class="text-xl font-semibold" style="color: var(--slate-800); font-weight: var(--font-bold);">中标概率预测</h2>
          </div>
        </div>
        <div class="card-body">
          <div class="grid lg:grid-cols-2 gap-8">
            <div class="flex items-center justify-center">
              <div class="probability-gauge">
                <canvas id="probabilityChart"></canvas>
                <div class="absolute inset-0 flex items-center justify-center">
                  <div class="text-center">
                    <div id="probability-value" class="text-4xl font-bold" style="font-size: 42px; font-weight: var(--font-extrabold); color: var(--slate-800);">0%</div>
                    <div class="text-sm" style="color: var(--slate-500); font-weight: var(--font-medium);">中标概率</div>
                  </div>
                </div>
              </div>
            </div>
            <div class="flex flex-col justify-center">
              <div id="probability-level" class="probability-high text-white rounded-lg p-6 mb-4 text-center" style="border-radius: var(--radius-xl);">
                <div class="text-2xl font-bold" id="level-text" style="font-size: 24px; font-weight: var(--font-bold);">高概率</div>
                <div class="text-sm mt-1" id="level-desc" style="opacity: 0.9;">建议积极参与投标</div>
              </div>
              <div class="space-y-2">
                <div class="flex items-center justify-between p-4" style="background: var(--slate-50); border-radius: var(--radius-lg);">
                  <span style="color: var(--slate-600); font-weight: var(--font-medium);">综合评分</span>
                  <span id="score-value" style="font-weight: var(--font-bold); color: var(--slate-800); font-size: var(--text-lg);">0</span>
                </div>
                <div class="flex items-center justify-between p-4" style="background: var(--slate-50); border-radius: var(--radius-lg);">
                  <span style="color: var(--slate-600); font-weight: var(--font-medium);">竞争对手数量</span>
                  <span id="competitor-count" style="font-weight: var(--font-bold); color: var(--slate-800); font-size: var(--text-lg);">0</span>
                </div>
                <div class="flex items-center justify-between p-4" style="background: var(--slate-50); border-radius: var(--radius-lg);">
                  <span style="color: var(--slate-600); font-weight: var(--font-medium);">历史中标率</span>
                  <span id="history-rate" style="font-weight: var(--font-bold); color: var(--slate-800); font-size: var(--text-lg);">0%</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 策略与分析 -->
      <div class="grid md:grid-cols-2 gap-6 mb-8">
        <!-- 投标策略 -->
        <div class="card">
          <div class="card-header">
            <div class="flex items-center gap-3">
              <span style="font-size: 22px;">💡</span>
              <h2 class="text-xl font-semibold" style="color: var(--slate-800); font-weight: var(--font-bold);">推荐投标策略</h2>
            </div>
          </div>
          <div class="card-body">
            <div id="strategy-list" class="space-y-3">
              <!-- Strategy items will be rendered here -->
            </div>
          </div>
        </div>

        <!-- 竞争对手分析 -->
        <div class="card">
          <div class="card-header">
            <div class="flex items-center gap-3">
              <span style="font-size: 22px;">🏢</span>
              <h2 class="text-xl font-semibold" style="color: var(--slate-800); font-weight: var(--font-bold);">竞争对手分析</h2>
            </div>
          </div>
          <div class="card-body">
            <div id="competitor-list" class="space-y-3">
              <!-- Competitor items will be rendered here -->
            </div>
          </div>
        </div>
      </div>

      <!-- 历史趋势 -->
      <div class="card mb-8">
        <div class="card-header">
          <div class="flex items-center gap-3">
            <span style="font-size: 22px;">📈</span>
            <h2 class="text-xl font-semibold" style="color: var(--slate-800); font-weight: var(--font-bold);">历史中标趋势</h2>
          </div>
        </div>
        <div class="card-body">
          <div class="chart-container">
            <canvas id="trendChart"></canvas>
          </div>
        </div>
      </div>

      <!-- 关键因素 -->
      <div class="card">
        <div class="card-header">
          <div class="flex items-center gap-3">
            <span style="font-size: 22px;">🔑</span>
            <h2 class="text-xl font-semibold" style="color: var(--slate-800); font-weight: var(--font-bold);">关键影响因素</h2>
          </div>
        </div>
        <div class="card-body">
          <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-4" id="factors-grid">
            <!-- Factors will be rendered here -->
          </div>
        </div>
      </div>
    </div>

    <!-- 空状态 -->
    <div id="empty-state" class="empty-prediction">
      <div class="empty-prediction-icon">🎯</div>
      <h3 class="text-xl font-semibold mb-2" style="color: var(--slate-700); font-weight: var(--font-bold); font-size: var(--text-2xl);">请输入项目信息</h3>
      <p style="color: var(--slate-500); font-size: var(--text-base);">填写上方表单后点击"开始预测"按钮，获取智能分析结果</p>
    </div>
  </div>

  <script>
    let probabilityChart = null;
    let trendChart = null;

    // Sample historical data
    const historicalData = {
      winRates: [45, 52, 48, 55, 60, 58, 62, 65],
      months: ['1 月', '2 月', '3 月', '4 月', '5 月', '6 月', '7 月', '8 月']
    };

    // Prediction logic
    function calculatePrediction(formData) {
      let score = 50;
      const factors = [];

      // Budget factor
      const budget = parseFloat(formData.budget) || 0;
      if (budget > 0) {
        if (budget < 100) {
          score += 15;
          factors.push({ name: '预算规模', value: '+15', impact: 'positive', desc: '小额项目竞争较少' });
        } else if (budget < 500) {
          score += 10;
          factors.push({ name: '预算规模', value: '+10', impact: 'positive', desc: '中等预算，适中竞争' });
        } else if (budget < 1000) {
          score += 5;
          factors.push({ name: '预算规模', value: '+5', impact: 'neutral', desc: '较大预算，竞争激烈' });
        } else {
          score -= 5;
          factors.push({ name: '预算规模', value: '-5', impact: 'negative', desc: '大额项目，强竞争' });
        }
      }

      // Qualification factor
      if (formData.qualification === 'A') {
        score += 20;
        factors.push({ name: '企业资质', value: '+20', impact: 'positive', desc: '甲级资质优势明显' });
      } else if (formData.qualification === 'B') {
        score += 10;
        factors.push({ name: '企业资质', value: '+10', impact: 'positive', desc: '乙级资质有竞争力' });
      } else if (formData.qualification === 'C') {
        score += 0;
        factors.push({ name: '企业资质', value: '0', impact: 'neutral', desc: '丙级资质需加强' });
      }

      // Region factor
      if (formData.region) {
        score += 5;
        factors.push({ name: '地区匹配', value: '+5', impact: 'positive', desc: '地区经验丰富' });
      }

      // Project type factor
      if (formData.type) {
        score += 8;
        factors.push({ name: '类型匹配', value: '+8', impact: 'positive', desc: '专业领域对口' });
      }

      score = Math.max(0, Math.min(100, score));
      const competitors = budget > 1000 ? 15 : budget > 500 ? 10 : budget > 100 ? 6 : 3;
      const historyRate = Math.round(45 + (score - 50) * 0.5);

      return {
        probability: score,
        competitors: competitors,
        historyRate: historyRate,
        factors: factors,
        level: score >= 70 ? 'high' : score >= 40 ? 'medium' : 'low'
      };
    }

    // Generate strategies
    function generateStrategies(prediction) {
      const strategies = [];
      
      if (prediction.level === 'high') {
        strategies.push({ icon: '✅', text: '重点投入资源，组建专业投标团队' });
        strategies.push({ icon: '💰', text: '报价可适度提高，保证利润空间' });
        strategies.push({ icon: '📋', text: '准备充分的技术方案和商务文件' });
      } else if (prediction.level === 'medium') {
        strategies.push({ icon: '⚖️', text: '合理控制报价，平衡中标率与利润' });
        strategies.push({ icon: '🔍', text: '深入研究招标文件，突出自身优势' });
        strategies.push({ icon: '🤝', text: '考虑与互补企业组成联合体' });
      } else {
        strategies.push({ icon: '⚠️', text: '谨慎评估投入产出比' });
        strategies.push({ icon: '📊', text: '分析竞争对手，寻找差异化优势' });
        strategies.push({ icon: '🎯', text: '聚焦小型项目，积累中标业绩' });
      }

      return strategies;
    }

    // Generate competitor analysis
    function generateCompetitors(prediction) {
      return [
        { name: '国有企业', strength: '高', probability: '35%' },
        { name: '大型民企', strength: '中高', probability: '28%' },
        { name: '本地企业', strength: '中', probability: '22%' },
        { name: '其他', strength: '低', probability: '15%' }
      ];
    }

    // Render prediction results
    function renderPrediction(prediction, formData) {
      document.getElementById('empty-state').classList.add('hidden');
      document.getElementById('prediction-result').classList.remove('hidden');

      document.getElementById('probability-value').textContent = prediction.probability + '%';
      document.getElementById('score-value').textContent = prediction.probability;
      document.getElementById('competitor-count').textContent = prediction.competitors + '家';
      document.getElementById('history-rate').textContent = prediction.historyRate + '%';

      const levelCard = document.getElementById('probability-level');
      const levelText = document.getElementById('level-text');
      const levelDesc = document.getElementById('level-desc');
      
      levelCard.className = 'rounded-lg p-6 mb-4 text-center ' + 
        (prediction.level === 'high' ? 'probability-high' : 
         prediction.level === 'medium' ? 'probability-medium' : 'probability-low');
      
      if (prediction.level === 'high') {
        levelText.textContent = '高概率';
        levelDesc.textContent = '建议积极参与投标';
      } else if (prediction.level === 'medium') {
        levelText.textContent = '中等概率';
        levelDesc.textContent = '需要优化投标策略';
      } else {
        levelText.textContent = '低概率';
        levelDesc.textContent = '建议谨慎评估';
      }

      const strategies = generateStrategies(prediction);
      document.getElementById('strategy-list').innerHTML = strategies.map(s => 
        `<div class="strategy-item">
          <span style="font-size: 24px; flex-shrink: 0;">${s.icon}</span>
          <span style="color: var(--slate-700); line-height: 1.5;">${s.text}</span>
        </div>`
      ).join('');

      const competitors = generateCompetitors(prediction);
      document.getElementById('competitor-list').innerHTML = competitors.map(c => 
        `<div class="competitor-item">
          <div>
            <div style="font-weight: var(--font-semibold); color: var(--slate-800);">${c.name}</div>
            <div style="font-size: var(--text-sm); color: var(--slate-500);">实力：${c.strength}</div>
          </div>
          <div style="color: var(--cosmic-600); font-weight: var(--font-bold); font-size: var(--text-lg);">${c.probability}</div>
        </div>`
      ).join('');

      document.getElementById('factors-grid').innerHTML = prediction.factors.map(f => 
        `<div class="factor-card factor-${f.impact}">
          <div style="font-size: var(--text-sm); color: var(--slate-600); font-weight: var(--font-medium); margin-bottom: var(--space-1);">${f.name}</div>
          <div style="font-size: var(--text-2xl); font-weight: var(--font-extrabold); color: ${f.impact === 'positive' ? 'var(--emerald-600)' : f.impact === 'negative' ? 'var(--coral-600)' : 'var(--slate-600)'};">${f.value}</div>
          <div style="font-size: var(--text-xs); color: var(--slate-500); margin-top: var(--space-1);">${f.desc}</div>
        </div>`
      ).join('');

      updateProbabilityChart(prediction.probability);
      updateTrendChart();
    }

    // Update probability gauge chart
    function updateProbabilityChart(probability) {
      const ctx = document.getElementById('probabilityChart').getContext('2d');
      
      if (probabilityChart) {
        probabilityChart.destroy();
      }

      const color = probability >= 70 ? '#10b981' : probability >= 40 ? '#f59e0b' : '#ef4444';

      probabilityChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['中标概率', '未中标概率'],
          datasets: [{
            data: [probability, 100 - probability],
            backgroundColor: [color, '#e2e8f0'],
            borderWidth: 0
          }]
        },
        options: {
          cutout: '75%',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { enabled: false }
          }
        }
      });
    }

    // Update trend chart
    function updateTrendChart() {
      const ctx = document.getElementById('trendChart').getContext('2d');
      
      if (trendChart) {
        trendChart.destroy();
      }

      trendChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: historicalData.months,
          datasets: [{
            label: '历史中标率 (%)',
            data: historicalData.winRates,
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59, 130, 246, 0.1)',
            tension: 0.4,
            fill: true,
            borderWidth: 3,
            pointBackgroundColor: '#3b82f6',
            pointBorderColor: 'white',
            pointBorderWidth: 2,
            pointRadius: 5
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: false,
              min: 30,
              max: 80,
              grid: {
                color: 'rgba(148, 163, 184, 0.2)'
              },
              ticks: {
                color: '#64748b'
              }
            },
            x: {
              grid: {
                display: false
              },
              ticks: {
                color: '#64748b'
              }
            }
          }
        }
      });
    }

    // Main prediction function
    function predictWin() {
      const formData = {
        name: document.getElementById('project-name').value,
        budget: document.getElementById('budget-amount').value,
        tenderUnit: document.getElementById('tender-unit').value,
        type: document.getElementById('project-type').value,
        region: document.getElementById('project-region').value,
        qualification: document.getElementById('qualification').value
      };

      if (!formData.name || !formData.budget) {
        alert('请至少填写项目名称和预算金额');
        return;
      }

      const prediction = calculatePrediction(formData);
      renderPrediction(prediction, formData);
      
      document.getElementById('prediction-result').scrollIntoView({ behavior: 'smooth' });
    }

    // Clear form
    function clearForm() {
      document.getElementById('project-name').value = '';
      document.getElementById('budget-amount').value = '';
      document.getElementById('tender-unit').value = '';
      document.getElementById('project-type').value = '';
      document.getElementById('project-region').value = '';
      document.getElementById('qualification').value = '';
      
      document.getElementById('prediction-result').classList.add('hidden');
      document.getElementById('empty-state').classList.remove('hidden');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      parseUrlParams();
    });

    function parseUrlParams() {
      const params = new URLSearchParams(window.location.search);
      const projectName = params.get('projectName');
      const budget = params.get('budget');
      const tenderUnit = params.get('tenderUnit');
      const region = params.get('region');
      
      if (projectName || budget || tenderUnit || region) {
        if (projectName) document.getElementById('project-name').value = projectName;
        if (budget) {
          const budgetNum = budget.replace(/[^0-9.]/g, '');
          if (budgetNum) document.getElementById('budget-amount').value = budgetNum;
        }
        if (tenderUnit) document.getElementById('tender-unit').value = tenderUnit;
        if (region) {
          const regionSelect = document.getElementById('project-region');
          for (let i = 0; i < regionSelect.options.length; i++) {
            if (regionSelect.options[i].value === region || regionSelect.options[i].text.includes(region)) {
              regionSelect.selectedIndex = i;
              break;
            }
          }
        }
        
        setTimeout(() => {
          alert('📊 已从项目雷达导入项目信息！\n\n请补充完整信息后点击"开始预测"按钮。');
        }, 500);
        
        if (projectName && budget) {
          setTimeout(() => predictWin(), 1000);
        }
      }
    }
  </script>
</body>
</html>
